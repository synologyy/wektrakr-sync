events {}

http {
  server {
    listen 80;

    # Supabase-style REST path -> PostgREST (strips the /rest/v1 prefix).
    location /rest/v1/ {
      rewrite ^/rest/v1/(.*)$ /$1 break;
      proxy_pass http://postgrest:3000;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
    }

    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      return 404;
    }
  }
}
