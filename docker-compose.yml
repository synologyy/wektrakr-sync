name: wetrakr-relay

# Self-contained stack — plain Postgres, no external services.
#   db      Postgres (schema created on first boot from db/init.sql)
#   web     Next.js front end + pairing wizard + manage page
#   worker  Python sync engine (Trakt -> WeTrakr), runs 24/7
#
# Quick start:
#   cp .env.example .env    # then set TRAKT_CLIENT_ID
#   docker compose up -d --build
#   open http://<server-ip>:8088

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: wetrakr
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wetrakr"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/wetrakr
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      WETRAKR_API_URL: ${WETRAKR_API_URL:-https://api.wetrakr.com}
      APP_URL: ${APP_URL:-}
    ports:
      - "${WEB_PORT:-8088}:3000"

  worker:
    build: ./worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/wetrakr
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      WETRAKR_API_URL: ${WETRAKR_API_URL:-https://api.wetrakr.com}
      HISTORY_INTERVAL: "300"
      WATCH_INTERVAL: "60"
      LOG_LEVEL: "INFO"

volumes:
  db_data:
